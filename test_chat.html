<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>South London College — Chatbot Tester</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:#0f1f3d; --navy2:#162848; --gold:#e8a623; --gold2:#f5c25a;
      --cream:#fdf8f0; --cream2:#f5ede0; --slate:#8899b0; --white:#ffffff;
      --red:#c0392b; --shadow:0 8px 32px rgba(15,31,61,0.18);
    }
    body { font-family:'DM Sans',sans-serif; background:var(--navy); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:0; overflow-x:hidden; }
    header { width:100%; background:var(--navy2); border-bottom:2px solid var(--gold); padding:18px 32px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:100; }
    .logo-badge { width:44px; height:44px; background:var(--gold); border-radius:12px; display:flex; align-items:center; justify-content:center; font-family:'DM Serif Display',serif; font-size:22px; color:var(--navy); font-weight:900; flex-shrink:0; }
    .header-text h1 { font-family:'DM Serif Display',serif; font-size:1.15rem; color:var(--white); letter-spacing:0.01em; }
    .header-text p { font-size:0.75rem; color:var(--gold2); font-weight:500; letter-spacing:0.08em; text-transform:uppercase; margin-top:1px; }
    .status-pill { margin-left:auto; display:flex; align-items:center; gap:7px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.13); border-radius:20px; padding:5px 14px; font-size:0.78rem; color:var(--slate); font-weight:500; cursor:pointer; transition:all 0.2s; }
    .status-pill:hover { background:rgba(255,255,255,0.12); }
    .status-dot { width:8px; height:8px; border-radius:50%; background:#6b7280; transition:background 0.3s; }
    .status-dot.online { background:#22c55e; box-shadow:0 0 6px #22c55e; }
    .status-dot.error  { background:var(--red); }
    .main { width:100%; max-width:900px; flex:1; display:flex; flex-direction:column; padding:28px 20px 20px; gap:20px; }
    .config-bar { background:var(--navy2); border:1px solid rgba(232,166,35,0.25); border-radius:14px; padding:16px 20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .config-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--gold); font-weight:600; white-space:nowrap; }
    .config-input { flex:1; min-width:200px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:8px 14px; font-family:'DM Sans',monospace; font-size:0.85rem; color:var(--cream); outline:none; transition:border 0.2s; }
    .config-input:focus { border-color:var(--gold); }
    .btn { padding:8px 18px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:600; cursor:pointer; border:none; transition:all 0.18s; white-space:nowrap; }
    .btn-gold  { background:var(--gold); color:var(--navy); }
    .btn-gold:hover  { background:var(--gold2); transform:translateY(-1px); }
    .btn-ghost { background:transparent; color:var(--slate); border:1px solid rgba(255,255,255,0.15); }
    .btn-ghost:hover { background:rgba(255,255,255,0.07); color:var(--white); }
    .chat-window { background:var(--cream); border-radius:18px; flex:1; min-height:420px; max-height:560px; display:flex; flex-direction:column; overflow:hidden; box-shadow:var(--shadow); }
    .chat-header { background:var(--navy); padding:14px 20px; display:flex; align-items:center; gap:10px; }
    .aria-avatar { width:32px; height:32px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'DM Serif Display',serif; font-size:14px; color:var(--navy); font-weight:900; }
    .chat-header-info h3 { font-family:'DM Serif Display',serif; font-size:0.95rem; color:var(--white); }
    .chat-header-info span { font-size:0.7rem; color:#22c55e; font-weight:500; }
    .messages { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:14px; scroll-behavior:smooth; }
    .messages::-webkit-scrollbar { width:4px; }
    .messages::-webkit-scrollbar-thumb { background:var(--cream2); border-radius:4px; }
    .msg { display:flex; gap:10px; max-width:84%; animation:msgIn 0.25s ease-out; }
    @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg.user { align-self:flex-end; flex-direction:row-reverse; }
    .msg.bot  { align-self:flex-start; }
    .msg-avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; margin-top:2px; }
    .msg.bot  .msg-avatar { background:var(--navy); color:var(--gold); font-family:'DM Serif Display',serif; }
    .msg.user .msg-avatar { background:var(--gold); color:var(--navy); }
    .msg-bubble { padding:12px 16px; border-radius:16px; font-size:0.875rem; line-height:1.65; word-break:break-word; }
    .msg.bot  .msg-bubble { background:var(--white); color:var(--navy); border-bottom-left-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,0.07); }
    .msg.user .msg-bubble { background:var(--navy); color:var(--white); border-bottom-right-radius:4px; white-space:pre-wrap; }
    .msg-time { font-size:0.65rem; color:var(--slate); margin-top:4px; }
    .msg.bot  .msg-time { text-align:left; }
    .msg.user .msg-time { text-align:right; }
    .typing-bubble { display:flex; gap:5px; align-items:center; padding:12px 16px; background:var(--white); border-radius:16px; border-bottom-left-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,0.07); }
    .typing-dot { width:7px; height:7px; border-radius:50%; background:var(--slate); animation:typingBounce 1.2s infinite ease-in-out; }
    .typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }
    .input-bar { padding:14px 16px; background:var(--white); border-top:1px solid var(--cream2); display:flex; gap:10px; align-items:flex-end; }
    .msg-input { flex:1; background:var(--cream); border:1.5px solid var(--cream2); border-radius:12px; padding:10px 14px; font-family:'DM Sans',sans-serif; font-size:0.88rem; color:var(--navy); outline:none; resize:none; min-height:42px; max-height:100px; transition:border 0.2s; }
    .msg-input:focus { border-color:var(--navy); }
    .msg-input::placeholder { color:#aab; }
    .send-btn { width:42px; height:42px; background:var(--navy); border:none; border-radius:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.18s; flex-shrink:0; }
    .send-btn:hover { background:var(--gold); }
    .send-btn:hover svg path { stroke:var(--navy); }
    .send-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .send-btn:disabled:hover { background:var(--navy); }
    .send-btn:disabled:hover svg path { stroke:var(--white); }
    .quick-section { background:var(--navy2); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:16px 20px; }
    .quick-section h3 { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--gold); font-weight:600; margin-bottom:12px; }
    .quick-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .quick-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:6px 14px; font-size:0.8rem; color:var(--cream); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.18s; }
    .quick-btn:hover { background:var(--gold); color:var(--navy); border-color:var(--gold); transform:translateY(-1px); }
    .history-section { background:var(--navy2); border:1px solid rgba(255,255,255,0.08); border-radius:14px; overflow:hidden; }
    .history-header { padding:14px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.07); }
    .history-header h3 { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--gold); font-weight:600; }
    .history-log { max-height:160px; overflow-y:auto; padding:12px 20px; font-family:'DM Sans',monospace; font-size:0.75rem; color:var(--slate); line-height:1.8; }
    .history-log::-webkit-scrollbar { width:3px; }
    .history-log::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }
    .log-entry { display:flex; gap:10px; }
    .log-time { color:var(--gold); opacity:0.7; flex-shrink:0; }
    .log-user { color:#64b5f6; } .log-bot { color:#a5d6a7; } .log-err { color:#ef9a9a; } .log-sys { color:var(--slate); font-style:italic; }
    .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:#99aabb; text-align:center; padding:20px; }
    .empty-icon { font-size:2.5rem; margin-bottom:4px; opacity:0.5; }
    .empty-state p { font-size:0.85rem; } .empty-state span { font-size:0.75rem; opacity:0.7; }
    @media(max-width:600px) { .main{padding:16px 12px} .config-bar{flex-direction:column;align-items:stretch} .msg{max-width:95%} }
  </style>
</head>
<body>

<header>
  <div class="logo-badge">S</div>
  <div class="header-text">
    <h1>South London College</h1>
    <p>Chatbot Test Console</p>
  </div>
  <div class="status-pill" onclick="checkHealth()">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Check connection</span>
  </div>
</header>

<div class="main">

  <div class="config-bar">
    <span class="config-label">API URL</span>
    <input class="config-input" id="apiUrl" type="text"
      value="https://web-production-b3707.up.railway.app"
      placeholder="https://web-production-b3707.up.railway.app" />
    <button class="btn btn-gold" onclick="checkHealth()">Connect</button>
    <button class="btn btn-ghost" onclick="clearChat()">Clear Chat</button>
  </div>

  <div class="chat-window">
    <div class="chat-header">
      <div class="aria-avatar">A</div>
      <div class="chat-header-info">
        <h3>Aria — Admissions Assistant</h3>
        <span>● Online</span>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">💬</div>
        <p>Send a message to start testing</p>
        <span>Or click a quick test below</span>
      </div>
    </div>
    <div class="input-bar">
      <textarea class="msg-input" id="msgInput" rows="1"
        placeholder="Ask about our southlondon college courses..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="history-section">
    <div class="history-header">
      <h3>📋 Request Log</h3>
      <button class="btn btn-ghost" style="font-size:0.75rem;padding:4px 12px;" onclick="clearLog()">Clear</button>
    </div>
    <div class="history-log" id="historyLog">
      <div class="log-entry"><span class="log-sys">— Console ready. Connect to your bot and start testing. —</span></div>
    </div>
  </div>

</div>

<script>
  let conversationHistory = [];
  let isWaiting = false;

  function getApiUrl() { return document.getElementById('apiUrl').value.replace(/\/$/, ''); }
  function nowStr()    { return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
  function handleKey(e)   { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }

  function log(text, type='sys') {
    const l = document.getElementById('historyLog');
    const d = document.createElement('div'); d.className='log-entry';
    d.innerHTML = `<span class="log-time">${nowStr()}</span><span class="log-${type}">${text}</span>`;
    l.appendChild(d); l.scrollTop = l.scrollHeight;
  }

  function clearLog() { document.getElementById('historyLog').innerHTML=''; log('Log cleared.','sys'); }
  function removeEmpty() { const e=document.getElementById('emptyState'); if(e) e.remove(); }

  function formatBotText(text) {
    // 1. Escape HTML
    text = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

    // 2. Clickable URLs
    text = text.replace(/(https?:\/\/[^\s<>"&]+)/g,
      '<a href="$1" target="_blank" rel="noopener" style="color:#1a56db;text-decoration:underline;word-break:break-all;">$1</a>');

    // 3. Divider lines ──────
    text = text.replace(/\u2500{6,}/g,
      '<div style="border-top:1px solid #dde3ea;margin:8px 0 6px;"></div>');

    // 4. **bold** markdown
    text = text.replace(/\*\*([^*\n]+)\*\*/g,
      '<strong style="font-weight:700;color:#0f1f3d;">$1</strong>');

    // 5. *hint* styling
    text = text.replace(/\*([^*\n]+)\*/g,
      '<em style="font-style:normal;font-weight:600;color:#162848;">$1</em>');

    // 6. 📘 course name — bold
    text = text.replace(/📘 ([^\n<]+)/g,
      '📘 <strong style="font-weight:700;color:#0f1f3d;font-size:0.95rem;">$1</strong>');

    // 7. ALL-CAPS section headings (Option 3 full details)
    const capHeadings = [
      'HOW LONG','ABOUT THIS COURSE','YOU WILL LEARN TO','PERFECT FOR',
      'TO ENROL YOU NEED','HOW YOU ARE ASSESSED','YOUR CERTIFICATE',
      'CAREER PATHS & SALARIES','WHERE THIS LEADS'
    ];
    capHeadings.forEach(function(h) {
      var re = new RegExp('(^|\n)(' + h + ')(\n|$)', 'g');
      text = text.replace(re,
        '$1<strong style="display:block;font-weight:700;color:#0f1f3d;font-size:0.78rem;letter-spacing:0.08em;margin-top:16px;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid #e8edf2;">$2</strong>$3');
    });

    // 8. Mixed-case section headings (summary card)
    var mixedHeadings = [
      'What you will learn','Who it is for','Entry Requirements',
      'Method of Assessment','Career Progression','Academic Progression',
      'Assessment','Overview','Certification','Duration & Hours',
      'Career Paths','What you will learn'
    ];
    mixedHeadings.forEach(function(h) {
      var re = new RegExp('(^|\n)(' + h + ':?)(\n|$)', 'g');
      text = text.replace(re,
        '$1<strong style="display:block;font-weight:700;color:#0f1f3d;margin-top:10px;margin-bottom:5px;">$2</strong>$3');
    });

    // 9. Inline bold labels
    text = text.replace(/\b(Level:|Type:|Awarded by:|Regulated:|Credits:|GLH:|TQT:|Standard:|Fast Track:|Access:|Overview:|Entry:|Top careers:|Duration & Hours:)/g,
      '<strong style="font-weight:700;color:#0f1f3d;">$1</strong>');

    // 10. Convert newlines to <br> BEFORE arrow processing
    text = text.replace(/\n\n/g, '\n');
    text = text.replace(/\n/g, '<br>');

    // 11. → gold arrow bullets — tight, no extra indent
    text = text.replace(/(<br>|^)(→ )([^<\n]*)/g,
      '$1<span style="display:block;line-height:1.8;padding:0;"><span style="color:#e8a623;font-weight:700;">→</span> $3</span>');

    return text;
  }

  function appendMessage(role, text) {
    removeEmpty();
    const msgs    = document.getElementById('messages');
    const wrapper = document.createElement('div'); wrapper.className = `msg ${role}`;
    const avatar  = document.createElement('div'); avatar.className  = 'msg-avatar';
    avatar.textContent = role === 'bot' ? 'A' : 'You';
    const inner  = document.createElement('div');
    const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
    if (role === 'bot') { bubble.innerHTML = formatBotText(text); }
    else               { bubble.textContent = text; }
    const time = document.createElement('div'); time.className = 'msg-time'; time.textContent = nowStr();
    inner.appendChild(bubble); inner.appendChild(time);
    wrapper.appendChild(avatar); wrapper.appendChild(inner);
    msgs.appendChild(wrapper); msgs.scrollTop = msgs.scrollHeight;
    return bubble;
  }

  function showTyping() {
    removeEmpty();
    const msgs    = document.getElementById('messages');
    const wrapper = document.createElement('div'); wrapper.className = 'msg bot'; wrapper.id = 'typingIndicator';
    const avatar  = document.createElement('div'); avatar.className = 'msg-avatar'; avatar.textContent = 'A';
    const bubble  = document.createElement('div'); bubble.className = 'typing-bubble';
    bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    wrapper.appendChild(avatar); wrapper.appendChild(bubble);
    msgs.appendChild(wrapper); msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() { const el = document.getElementById('typingIndicator'); if(el) el.remove(); }

  function clearChat() {
    conversationHistory = [];
    document.getElementById('messages').innerHTML =
      '<div class="empty-state" id="emptyState"><div class="empty-icon">💬</div><p>Send a message to start testing</p><span>Or click a quick test below</span></div>';
    log('Chat cleared — conversation history reset.', 'sys');
  }

  async function checkHealth() {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    txt.textContent = 'Connecting…'; dot.className = 'status-dot';
    try {
      const res = await fetch(`${getApiUrl()}/health`, { signal: AbortSignal.timeout(6000) });
      if (res.ok) { dot.className='status-dot online'; txt.textContent='Connected'; log(`Connected to ${getApiUrl()}`,'bot'); }
      else { throw new Error(`HTTP ${res.status}`); }
    } catch(err) {
      dot.className='status-dot error'; txt.textContent='Not connected';
      log(`Connection failed: ${err.message}`, 'err');
    }
  }

  async function sendMessage() {
    if (isWaiting) return;
    const input = document.getElementById('msgInput');
    const text  = input.value.trim();
    if (!text) return;
    input.value = ''; input.style.height = 'auto';
    appendMessage('user', text);
    log(`You: ${text}`, 'user');
    conversationHistory.push({ role: 'user', content: text });
    isWaiting = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();
    try {
      const res = await fetch(`${getApiUrl()}/chat`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text, history: conversationHistory.slice(0, -1) }),
        signal:  AbortSignal.timeout(35000),
      });
      removeTyping();
      if (!res.ok) { const e = await res.text(); throw new Error(`Server ${res.status}: ${e}`); }
      const data  = await res.json();
      const reply = data.reply || '(no reply received)';
      appendMessage('bot', reply);
      conversationHistory.push({ role: 'assistant', content: reply });
      log(`Aria: ${reply.substring(0, 90)}${reply.length > 90 ? '…' : ''}`, 'bot');
    } catch(err) {
      removeTyping();
      appendMessage('bot', `⚠️ Error: ${err.message}\n\nMake sure the Railway service is running.`);
      log(`Error: ${err.message}`, 'err');
      conversationHistory.pop();
    } finally {
      isWaiting = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('msgInput').focus();
    }
  }

  function quickSend(msg) { document.getElementById('msgInput').value = msg; sendMessage(); }

  window.addEventListener('load', () => { setTimeout(checkHealth, 600); });
</script>
</body>
</html>
